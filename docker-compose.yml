services:
  htg-rates:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env.example
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
